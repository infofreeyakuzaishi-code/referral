<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ご縁マッチング | Connection Search</title>
    <style>
        :root {
            --primary-color: #2563eb; /* 信頼のブルー */
            --cta-color: #10b981;    /* 安心のグリーン */
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --accent-red: #e11d48;
        }

        body {
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 90%;
            max-width: 420px;
            background: var(--card-bg);
            padding: 48px 32px;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .header-icon {
            font-size: 52px;
            margin-bottom: 20px;
            display: inline-block;
        }

        h2 {
            font-size: 1.6rem;
            font-weight: 800;
            margin: 0 0 12px 0;
            letter-spacing: -0.02em;
            color: var(--text-main);
        }

        .description {
            font-size: 0.95rem;
            color: var(--text-sub);
            line-height: 1.7;
            margin-bottom: 36px;
        }

        .search-box {
            margin-bottom: 28px;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 18px 22px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
            background: #f1f5f9;
        }

        input:focus {
            border-color: var(--primary-color);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .search-btn {
            width: 100%;
            padding: 18px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }

        .search-btn:active {
            transform: scale(0.97);
            background: #1d4ed8;
        }

        #result {
            display: none;
            margin-top: 36px;
            padding-top: 36px;
            border-top: 1px dashed #cbd5e1;
            animation: fadeInSlide 0.5s ease-out;
        }

        @keyframes fadeInSlide {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-label {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .count-number {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--accent-red);
            line-height: 1;
            display: inline-block;
            margin: 12px 0;
        }

        .count-unit {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-main);
            margin-left: 6px;
        }

        .note {
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-bottom: 24px;
        }

        .cta-message {
            font-weight: 700;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .cta-button {
            display: block;
            background: var(--cta-color);
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 1.1rem;
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
            transition: all 0.2s;
        }

        .cta-button:active {
            transform: translateY(2px);
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);
        }

        .loading {
            display: none;
            margin-top: 24px;
            font-weight: 700;
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-icon">🤝</div>
        <h2>ご縁マッチング検索</h2>
        <p class="description">
            私の人脈ネットワーク（2020年〜）から、<br>
            あなたのお力になれそうな情報を照合します。
        </p>
        
        <div class="search-box">
            <input type="text" id="keyword" placeholder="例：東京, エンジニア, 美容">
            <button onclick="searchConnections()" class="search-btn">照合を開始する</button>
        </div>
        
        <div id="loading" class="loading">データベースを照合中...</div>

        <div id="result">
            <div class="result-label">あなたへご紹介可能な「ご縁」候補：</div>
            <div class="count-wrap">
                <span>約</span>
                <span id="result-count" class="count-number">0</span>
                <span class="count-unit">件ございます</span>
            </div>
            <p class="note">（※複数のプロジェクトやコミュニティを含む延べ数です）</p>
            
            <div class="cta-message">
                ぜひ一緒にご縁を広げていきましょう！<br>
                よかったら１ON１の日程調整をお願いします。
            </div>
            
            <a href="YOUR_SCHEDULE_TOOL_URL" class="cta-button">日程調整ページへ</a>
        </div>
    </div>

    <script>
        function searchConnections() {
            const q = document.getElementById('keyword').value;
            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('result');
            const countDisplay = document.getElementById('result-count');
            
            if(!q) return alert("キーワードを入力してください");

            // GASのウェブアプリURLをここに貼り付け
            const apiUrl = 'https://script.google.com/macros/s/AKfycbyoOUKQyNxdz17cbD0igPBZ1QcLwdgziR2_ZwBM_OHj3PEw4p5FAv4lwQvyzFnEuZYa/exec'; 

            loading.style.display = 'block';
            resultDiv.style.display = 'none';

            fetch(`${apiUrl}?q=${encodeURIComponent(q)}`)
            .then(res => res.json())
            .then(data => {
                loading.style.display = 'none';
                resultDiv.style.display = 'block';
                countDisplay.innerText = data.count;
            })
            .catch(err => {
                loading.style.display = 'none';
                alert("通信エラーが発生しました。");
                console.error(err);
            });
        }
    </script>
</body>
</html>
