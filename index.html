<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ご縁マッチング検索</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; padding: 20px; text-align: center; color: #333; background-color: #f4f7f6; }
        .container { max-width: 450px; margin: 0 auto; background: white; padding: 40px 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: #2c3e50; font-size: 1.4em; margin-bottom: 10px; }
        p { font-size: 0.9em; color: #666; line-height: 1.6; }
        .search-box { margin: 25px 0; }
        input { width: 85%; padding: 15px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; outline: none; transition: border 0.3s; }
        input:focus { border-color: #007bff; }
        button { background: #007bff; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; width: 90%; margin-top: 10px; }
        #result { margin-top: 30px; padding: 20px; border-top: 1px solid #eee; display: none; animation: fadeIn 0.5s; }
        .count-highlight { font-size: 1.8em; color: #e74c3c; font-weight: bold; display: block; margin: 10px 0; }
        .tag-info { background: #f8f9fa; padding: 10px; border-radius: 8px; font-size: 0.85em; color: #555; }
        .cta-button { display: inline-block; background: #27ae60; color: white; text-decoration: none; padding: 18px 30px; border-radius: 10px; font-weight: bold; margin-top: 20px; width: 80%; }
        .loading { display: none; margin: 20px 0; color: #007bff; font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <h2>🤝 ご縁マッチング検索</h2>
        <p>私の人脈リスト（2020年〜）から、<br>あなたのお力になれそうな情報を検索します。</p>
        
        <div class="search-box">
            <input type="text" id="keyword" placeholder="例：東京, エンジニア, ゴルフ">
            <button onclick="searchConnections()">検索を実行する</button>
        </div>
        
        <div id="loading" class="loading">データベースを照合中...</div>

        <div id="result">
            <p>検索の結果、</p>
            <span id="result-message" class="count-highlight"></span>
            <p>の候補が見つかりました！</p>
            <div id="tag-area" class="tag-info"></div>
            
            <p style="margin-top:25px; font-weight:bold;">ぜひ一緒にご縁を広げていきましょう！</p>
            <a href="YOUR_SCHEDULE_TOOL_URL" class="cta-button">こちらから日程調整</a>
        </div>
    </div>

    <script>
        function searchConnections() {
            const q = document.getElementById('keyword').value;
            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('result');
            
            if(!q) return alert("キーワードを入力してください");

            // GASのデプロイ後に発行されるウェブアプリURLをここに貼り付け
            const apiUrl = 'https://script.google.com/macros/s/AKfycbyoOUKQyNxdz17cbD0igPBZ1QcLwdgziR2_ZwBM_OHj3PEw4p5FAv4lwQvyzFnEuZYa/exec'; 

            loading.style.display = 'block';
            resultDiv.style.display = 'none';

            fetch(`${apiUrl}?q=${encodeURIComponent(q)}`)
            .then(res => res.json())
            .then(data => {
                loading.style.display = 'none';
                resultDiv.style.display = 'block';
                
                const msg = document.getElementById('result-message');
                const tagArea = document.getElementById('tag-area');
                
                // 案Aの反映：人数ではなく「ご縁候補」と「件」という表現
                msg.innerText = `ご紹介可能な「ご縁」候補： 約 ${data.count} 件`;
                
                if(data.tags.length > 0) {
                    tagArea.style.display = 'block';
                    tagArea.innerText = `（関連キーワード：${data.tags.join(', ')} など）`;
                } else {
                    tagArea.style.display = 'none';
                }
            })
            .catch(err => {
                loading.style.display = 'none';
                alert("検索に失敗しました。URLの設定を確認してください。");
                console.error(err);
            });
        }
    </script>
</body>
</html>
