<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ご縁マッチング | Connection Search</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --accent-color: #f59e0b;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
        }

        body {
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 40px 24px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            text-align: center;
        }

        .header-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: inline-block;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0 0 8px 0;
            letter-spacing: -0.025em;
        }

        .description {
            font-size: 0.875rem;
            color: var(--text-sub);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .search-box {
            position: relative;
            margin-bottom: 24px;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 16px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.2s;
            outline: none;
            background: #f1f5f9;
        }

        input:focus {
            border-color: var(--primary-color);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        button:active {
            transform: scale(0.98);
            background: #1d4ed8;
        }

        #result {
            display: none;
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px dashed #e2e8f0;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .count-wrap {
            margin: 16px 0;
        }

        .count-number {
            font-size: 3rem;
            font-weight: 900;
            color: var(--primary-color);
            line-height: 1;
        }

        .count-unit {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            margin-left: 4px;
        }

        .cta-button {
            display: block;
            background: #10b981;
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            margin-top: 24px;
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);
            transition: background 0.2s;
        }

        .cta-button:hover {
            background: #059669;
        }

        .loading {
            display: none;
            margin-top: 20px;
            font-weight: 600;
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-icon">🤝</div>
        <h2>ご縁マッチング検索</h2>
        <p class="description">
            私の人脈ネットワーク（2020年〜）から、<br>
            あなたのお力になれそうな候補を照合します。
        </p>
        
        <div class="search-box">
            <input type="text" id="keyword" placeholder="キーワードを入力（例：東京, エンジニア）">
            <button onclick="searchConnections()" style="margin-top: 12px;">照合を開始する</button>
        </div>
        
        <div id="loading" class="loading">データベースにアクセス中...</div>

        <div id="result">
            <div class="result-label">Matches Found</div>
            <div class="count-wrap">
                <span id="result-count" class="count-number">0</span>
                <span class="count-unit">件</span>
            </div>
            <p style="font-weight: 600; font-size: 0.95rem;">
                ぜひ一緒にご縁を広げていきましょう！
            </p>
            <a href="YOUR_SCHEDULE_TOOL_URL" class="cta-button">日程調整へ進む</a>
        </div>
    </div>

    <script>
        function searchConnections() {
            const q = document.getElementById('keyword').value;
            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('result');
            const countDisplay = document.getElementById('result-count');
            
            if(!q) return alert("キーワードを入力してください");

            // GASのウェブアプリURLをここに貼り付け
            const apiUrl = 'https://script.google.com/macros/s/AKfycbyoOUKQyNxdz17cbD0igPBZ1QcLwdgziR2_ZwBM_OHj3PEw4p5FAv4lwQvyzFnEuZYa/exec'; 

            loading.style.display = 'block';
            resultDiv.style.display = 'none';

            fetch(`${apiUrl}?q=${encodeURIComponent(q)}`)
            .then(res => res.json())
            .then(data => {
                loading.style.display = 'none';
                resultDiv.style.display = 'block';
                countDisplay.innerText = data.count;
            })
            .catch(err => {
                loading.style.display = 'none';
                alert("通信エラーが発生しました。");
                console.error(err);
            });
        }
    </script>
</body>
</html>
